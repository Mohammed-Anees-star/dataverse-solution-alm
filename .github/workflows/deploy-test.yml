# =============================================================================
# WORKFLOW: Deploy to TEST Environment
# =============================================================================
# TRIGGER: Push to main branch (PR merged) — OR manual dispatch
# PURPOSE: Every merge to main automatically deploys to TEST for QA validation.
#
# STAGES:
#   1. Validate  — Pack + run Solution Checker (fail on High/Critical)
#   2. Deploy    — Import managed solutions to TEST environment
#   3. Notify    — Post result to GitHub commit status
#
# WHAT THIS TEACHES:
#   - Jobs with dependencies (needs: validate)
#   - Environment protection rules (manual approval gate for PROD)
#   - Upload/download artifacts between jobs
#   - Environment secrets scoped per environment (test vs prod)
# =============================================================================

name: Deploy to TEST

on:
  push:
    branches: [main]
    paths:
      - "solution-components/**"  # Only trigger when solution source changes

  workflow_dispatch:              # Allow manual trigger

jobs:
  # ── STAGE 1: Validate ──────────────────────────────────────────────────────

  validate:
    name: Pack + Solution Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PAC CLI
        run: npm install -g @microsoft/power-platform-cli

      - name: Pack all solutions (managed)
        run: |
          pwsh ./pipeline/import/import-solution.ps1 \
            -TargetUrl "${{ secrets.PP_TEST_URL }}" \
            -TenantId "${{ secrets.PP_TENANT_ID }}" \
            -AppId "${{ secrets.PP_APP_ID }}" \
            -ClientSecret "${{ secrets.PP_CLIENT_SECRET }}" \
            -DryRun   # Pack only — no import yet

      - name: Run Solution Checker
        run: |
          pwsh ./pipeline/validate/validate-solution.ps1 \
            -FailOn High \
            -Geo UnitedStates
        # Exit code 1 if Critical or High issues found → job fails → deploy blocked

      - name: Upload solution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: managed-solutions
          path: ./artifacts/*.zip
          retention-days: 7

      - name: Upload checker reports
        uses: actions/upload-artifact@v4
        if: always()              # Upload even if checker found issues
        with:
          name: checker-reports
          path: ./checker-results/
          retention-days: 30

  # ── STAGE 2: Deploy to TEST ────────────────────────────────────────────────

  deploy-test:
    name: Deploy → TEST
    runs-on: ubuntu-latest
    needs: validate               # Only runs if validate passed
    environment: test             # GitHub Environment — can add protection rules here

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PAC CLI
        run: npm install -g @microsoft/power-platform-cli

      - name: Download packed artifacts
        uses: actions/download-artifact@v4
        with:
          name: managed-solutions
          path: ./artifacts/

      - name: Authenticate to TEST
        run: |
          pac auth create \
            --url "${{ secrets.PP_TEST_URL }}" \
            --tenant "${{ secrets.PP_TENANT_ID }}" \
            --applicationId "${{ secrets.PP_APP_ID }}" \
            --clientSecret "${{ secrets.PP_CLIENT_SECRET }}"

      - name: Import solutions to TEST
        run: |
          pwsh ./pipeline/import/import-solution.ps1 \
            -TargetUrl "${{ secrets.PP_TEST_URL }}" \
            -TenantId "${{ secrets.PP_TENANT_ID }}" \
            -AppId "${{ secrets.PP_APP_ID }}" \
            -ClientSecret "${{ secrets.PP_CLIENT_SECRET }}" \
            -ConnectionRefsFile "./connection-references/test-mappings.json" \
            -Strategy Update \
            -ActivatePlugins

      - name: Set environment variables (TEST)
        run: |
          pac env-var set --schema-name halyse_ApiEndpoint \
            --value "${{ secrets.TEST_API_ENDPOINT }}"
          pac env-var set --schema-name halyse_MaxRetries \
            --value "3"

      - name: Verify deployment
        run: |
          echo "=== Installed Solutions ==="
          pac solution list | grep -i halyse || echo "No Halyse solutions found"

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment to TEST" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ secrets.PP_TEST_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
